<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語重要事項データベース</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }
  header {
    background: #fff;
    border-bottom: 0.5px solid #dddbd2;
    padding: 1.25rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-size: 18px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 0.75rem;
  }
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0.75rem;
  }
  .search-icon {
    color: #888780;
    flex-shrink: 0;
    width: 18px;
    height: 18px;
  }
  .search-bar input {
    flex: 1;
    font-size: 14px;
    padding: 7px 12px;
    border: 0.5px solid #b4b2a9;
    border-radius: 8px;
    background: #f5f4f0;
    color: #1a1a18;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-bar input:focus { border-color: #5f5e5a; background: #fff; }
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .chip {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid #b4b2a9;
    background: #fff;
    cursor: pointer;
    color: #5f5e5a;
    transition: all 0.15s;
    font-family: inherit;
  }
  .chip:hover { border-color: #5f5e5a; color: #1a1a18; }
  .chip.active { background: #e6f1fb; color: #0c447c; border-color: #85b7eb; }
  .stats {
    font-size: 12px;
    color: #888780;
    padding: 0 0 0.25rem;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .header-top h1 {
    margin-bottom: 0;
  }
  .btn-add {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
    border: 0.5px solid #85b7eb;
    background: #e6f1fb;
    color: #0c447c;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .btn-add:hover { background: #d0e6f7; border-color: #5a9fd4; }
  .btn-add svg { width: 14px; height: 14px; }

  /* ── モーダル ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,24,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    padding: 1.5rem;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 1.25rem;
  }
  .field {
    margin-bottom: 1rem;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #5f5e5a;
    margin-bottom: 5px;
  }
  .field select,
  .field input[type="text"],
  .field textarea {
    width: 100%;
    font-size: 14px;
    padding: 8px 12px;
    border: 0.5px solid #b4b2a9;
    border-radius: 8px;
    background: #f5f4f0;
    color: #1a1a18;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .field select:focus,
  .field input[type="text"]:focus,
  .field textarea:focus { border-color: #5f5e5a; background: #fff; }
  .field textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

  /* itemsセクション */
  .items-label {
    font-size: 12px;
    font-weight: 500;
    color: #5f5e5a;
    margin-bottom: 5px;
  }
  .items-hint {
    font-size: 11px;
    color: #b4b2a9;
    margin-bottom: 8px;
  }
  .items-rows { display: flex; flex-direction: column; gap: 6px; }
  .item-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .item-row input {
    flex: 1;
    font-size: 13px;
    padding: 6px 10px;
    border: 0.5px solid #b4b2a9;
    border-radius: 8px;
    background: #f5f4f0;
    color: #1a1a18;
    outline: none;
    font-family: "SF Mono", "Fira Code", Consolas, monospace;
    transition: border-color 0.15s;
  }
  .item-row input:focus { border-color: #5f5e5a; background: #fff; }
  .btn-remove-item {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; cursor: pointer;
    color: #b4b2a9; border-radius: 6px; flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
  }
  .btn-remove-item:hover { color: #c0392b; background: #fef0ee; }
  .btn-add-item {
    font-size: 12px;
    color: #0c447c;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }
  .btn-add-item:hover { text-decoration: underline; }

  /* タイプ切替 */
  .type-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
  }
  .type-btn {
    flex: 1;
    padding: 7px;
    font-size: 13px;
    border-radius: 8px;
    border: 0.5px solid #b4b2a9;
    background: #f5f4f0;
    color: #5f5e5a;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    text-align: center;
  }
  .type-btn.active { background: #e6f1fb; color: #0c447c; border-color: #85b7eb; }

  /* モーダルアクション */
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }
  .btn-cancel {
    font-size: 14px;
    padding: 8px 18px;
    border-radius: 8px;
    border: 0.5px solid #b4b2a9;
    background: #fff;
    color: #5f5e5a;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-cancel:hover { background: #f5f4f0; }
  .btn-save {
    font-size: 14px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    background: #0c447c;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #0a3869; }
  .error-msg {
    font-size: 12px;
    color: #c0392b;
    margin-top: 0.5rem;
    display: none;
  }
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 1rem 1rem 3rem;
  }
  .card {
    background: #fff;
    border: 0.5px solid #dddbd2;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover { border-color: #888780; }
  .card-header {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    justify-content: space-between;
  }
  .card-num {
    font-size: 11px;
    color: #b4b2a9;
    min-width: 22px;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a18;
    flex: 1;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .badge {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 10px;
    white-space: nowrap;
    font-weight: 400;
  }
  .badge-syn  { background: #eaf3de; color: #3b6d11; }
  .badge-phrase { background: #faeeda; color: #633806; }
  .badge-prep { background: #e6f1fb; color: #185fa5; }
  .badge-gram { background: #eeedfe; color: #3c3489; }
  .badge-constr { background: #faeeda; color: #633806; }
  .badge-word { background: #e1f5ee; color: #085041; }
  .chevron {
    width: 16px;
    height: 16px;
    color: #b4b2a9;
    margin-top: 2px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .card.open .chevron { transform: rotate(180deg); }
  .card-body {
    display: none;
    margin-top: 10px;
    border-top: 0.5px solid #dddbd2;
    padding-top: 10px;
  }
  .card.open .card-body { display: block; }
  .item-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .item {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    background: #f5f4f0;
    color: #5f5e5a;
    font-family: "SF Mono", "Fira Code", Consolas, monospace;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    user-select: none;
    position: relative;
  }
  .item:hover { background: #e6f1fb; color: #0c447c; }
  .item.copied { background: #eaf3de; color: #3b6d11; }

  /* カードアクションボタン（編集・削除） */
  .card-actions {
    display: flex;
    gap: 4px;
    margin-left: 6px;
    flex-shrink: 0;
  }
  .card-action-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: 0.5px solid transparent;
    border-radius: 7px;
    background: none;
    cursor: pointer;
    color: #b4b2a9;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .card-action-btn:hover { color: #5f5e5a; background: #f5f4f0; border-color: #dddbd2; }
  .card-action-btn.delete:hover { color: #c0392b; background: #fef0ee; border-color: #f5c2bb; }
  .card-action-btn svg { width: 13px; height: 13px; pointer-events: none; }

  /* コピートースト */
  #copyToast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1a1a18;
    color: #fff;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 20px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 300;
    white-space: nowrap;
  }
  #copyToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .sub-label {
    font-size: 12px;
    color: #5f5e5a;
    margin-top: 10px;
    margin-bottom: 2px;
    font-weight: 500;
  }
  .note {
    font-size: 13px;
    color: #5f5e5a;
    line-height: 1.75;
    margin-top: 6px;
    white-space: pre-wrap;
  }
  .empty {
    text-align: center;
    padding: 3rem;
    color: #b4b2a9;
    font-size: 14px;
  }
  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 0.75rem 0.75rem 3rem; }
    .card { padding: 0.875rem 1rem; }
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>英語重要事項データベース</h1>
    <button class="btn-add" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      項目を追加
    </button>
  </div>
  <div class="search-bar">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="キーワードで検索（日本語・英語）..." oninput="render()">
  </div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="stats" id="stats"></div>
</header>
<main id="cards"></main>

<!-- コピートースト -->
<div id="copyToast"></div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModalOverlay" onclick="handleEditOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">項目を編集</div>

    <div class="field">
      <label>カテゴリ</label>
      <select id="editCat">
        <option>同意語表現</option>
        <option>前置詞</option>
        <option>文法</option>
        <option>多義語</option>
        <option>語法</option>
        <option>語彙</option>
        <option>重要構文</option>
      </select>
    </div>

    <div class="field">
      <label>タイトル（見出し）</label>
      <input type="text" id="editTitle" placeholder="タイトル">
    </div>

    <div class="field">
      <label>バッジ種別</label>
      <select id="editBadge">
        <option value="synonym">同意語</option>
        <option value="phrase">重要表現</option>
        <option value="prep">前置詞</option>
        <option value="gram">文法</option>
        <option value="constr">構文</option>
        <option value="word">語法・多義</option>
      </select>
    </div>

    <div class="type-toggle">
      <button class="type-btn active" id="editTypeItems" onclick="switchEditType('items')">表現リスト</button>
      <button class="type-btn" id="editTypeNote" onclick="switchEditType('note')">ノート（メモ）</button>
    </div>

    <div id="editSectionItems">
      <div class="items-label">表現リスト</div>
      <div class="items-hint">1行ずつ入力してください。右端の × で削除できます。</div>
      <div class="items-rows" id="editItemsRows"></div>
      <button class="btn-add-item" onclick="addEditItemRow()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        表現を追加
      </button>
    </div>

    <div id="editSectionNote" style="display:none">
      <div class="field">
        <label>ノート</label>
        <textarea id="editNote" placeholder="内容を入力（改行可）"></textarea>
      </div>
    </div>

    <div class="error-msg" id="editErrorMsg"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEditItem()">保存する</button>
    </div>
  </div>
</div>

<!-- 追加モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">新しい項目を追加</div>

    <div class="field">
      <label>カテゴリ</label>
      <select id="newCat">
        <option>同意語表現</option>
        <option>前置詞</option>
        <option>文法</option>
        <option>多義語</option>
        <option>語法</option>
        <option>語彙</option>
        <option>重要構文</option>
      </select>
    </div>

    <div class="field">
      <label>タイトル（見出し）</label>
      <input type="text" id="newTitle" placeholder="例：「〜に感謝する」">
    </div>

    <div class="field">
      <label>バッジ種別</label>
      <select id="newBadge">
        <option value="synonym">同意語</option>
        <option value="phrase">重要表現</option>
        <option value="prep">前置詞</option>
        <option value="gram">文法</option>
        <option value="constr">構文</option>
        <option value="word">語法・多義</option>
      </select>
    </div>

    <div class="type-toggle">
      <button class="type-btn active" id="typeItems" onclick="switchType('items')">表現リスト</button>
      <button class="type-btn" id="typeNote" onclick="switchType('note')">ノート（メモ）</button>
    </div>

    <!-- 表現リスト入力 -->
    <div id="sectionItems">
      <div class="items-label">表現リスト</div>
      <div class="items-hint">1行ずつ入力してください。右端の × で削除できます。</div>
      <div class="items-rows" id="itemsRows"></div>
      <button class="btn-add-item" onclick="addItemRow()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        表現を追加
      </button>
    </div>

    <!-- ノート入力 -->
    <div id="sectionNote" style="display:none">
      <div class="field">
        <label>ノート</label>
        <textarea id="newNote" placeholder="内容を入力（改行可）"></textarea>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">追加する</button>
    </div>
  </div>
</div>

<script>
const data = [
  {id:1,cat:"同意語表現",title:"「ときどき」",badge:"synonym",items:["sometimes","on occasion","occasionally","at times","at intervals","now and then","every now and then","now and again","every now and again","once in a while","from time to time","on and off"]},
  {id:2,cat:"同意語表現",title:"「最終的に、結局」",badge:"synonym",items:["finally","eventually","ultimately","after all","at last","at length","in the end","in the long run","in the final resort","in the final analysis"]},
  {id:3,cat:"前置詞",title:"「〜に関して、〜について」",badge:"prep",items:["concerning","regarding","respecting","as concerns","as regards","as respects","with regard to","with respect to","with relation to","with reference to","about","as to"]},
  {id:4,cat:"前置詞",title:"「〜とは関係なく、〜に関わらず」",badge:"prep",items:["regardless of","irrespective of","with no regard to","with no respect to","with no relation to","with no reference to","without regard to","without respect to","without relation to","without reference to"]},
  {id:5,cat:"同意語表現",title:"「〜する傾向がある」",badge:"synonym",items:["tend to V","have a tendency to V","be inclined to V","incline to V","have an inclination to V","be apt to V","be prone to V","be ready to V","be liable to V","be disposed to V"]},
  {id:6,cat:"同意語表現",title:"「AにBを供給する」",badge:"phrase",items:["provide A with B","provide B for A","supply A with B","supply B for A","furnish A with B","furnish B to A","serve A with B","serve B to A","present A with B","present B to A"]},
  {id:7,cat:"同意語表現",title:"「AとBを区別する」",badge:"phrase",items:["tell A from B","tell the difference between A and B","distinguish A from B","distinguish between A and B","differentiate A from B","differentiate between A and B","discriminate A from B","discriminate between A and B","discern A from B","discern between A and B"]},
  {id:8,cat:"同意語表現",title:"「BのことでAを非難する・責める」",badge:"phrase",items:["blame A for B","blame B on A","criticize A on B","condemn A for B","accuse A of B","charge A with B","charge B on A"]},
  {id:9,cat:"同意語表現",title:"「〜を確信している」",badge:"synonym",items:["be convinced that/of","be persuaded that/of","be sure that/of","be certain that/of","be confident that/of"]},
  {id:10,cat:"同意語表現",title:"「AをBに制限する」",badge:"phrase",items:["limit A to B","restrict A to B","confine A to B"]},
  {id:11,cat:"同意語表現",title:"「〜を引き起こす、もたらす」",badge:"synonym",items:["give rise to","give birth to","bring about","bring on","cause","be the cause of","result in","end in","lead to","generate","raise","produce"]},
  {id:12,cat:"同意語表現",title:"「AをBに伝える」",badge:"phrase",items:["communicate A to B","convey A to B","transmit A to B","import A to B","pass on A to B"]},
  {id:13,cat:"同意語表現",title:"「〜に影響を及ぼす」",badge:"synonym",items:["have an influence on","have an influence upon","influence","have an effect on","affect","have an impact on","impact"]},
  {id:14,cat:"同意語表現",title:"「特に、とりわけ」",badge:"synonym",items:["above all","in particular","particularly","especially"]},
  {id:15,cat:"同意語表現",title:"「さまざまな」",badge:"synonym",items:["a variety of","various","diverse","different"]},
  {id:16,cat:"同意語表現",title:"「適切な、ふさわしい」",badge:"synonym",items:["appropriate","suitable","proper","fit"]},

const cats = ["すべて","同意語表現","前置詞","文法","多義語","語法","語彙","重要構文"];
const badgeMap = {synonym:"badge-syn",phrase:"badge-phrase",prep:"badge-prep",gram:"badge-gram",constr:"badge-constr",word:"badge-word"};
const badgeLabel = {synonym:"同意語",phrase:"重要表現",prep:"前置詞",gram:"文法",constr:"構文",word:"語法・多義"};
let activeCat = "すべて";
let openCards = new Set();

function filterData() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  return data.filter(d => {
    const catMatch = activeCat === "すべて" || d.cat === activeCat;
    if (!q) return catMatch;
    const fields = [d.title, d.cat, d.note || "", ...(d.items || []), ...((d.extra || []).flatMap(e => [e.label, ...e.items]))].join(" ").toLowerCase();
    return catMatch && fields.includes(q);
  });
}

const userAddedIds = new Set(); // ユーザーが追加した項目のID集合

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 900);
    showToast('コピーしました: ' + text);
  });
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function render() {
  const filtered = filterData();
  document.getElementById("stats").textContent = `${filtered.length} 件 / 全${data.length}件`;
  const container = document.getElementById("cards");
  container.innerHTML = "";
  if (!filtered.length) {
    container.innerHTML = '<div class="empty">該当する項目が見つかりません</div>';
    return;
  }
  filtered.forEach(d => {
    const div = document.createElement("div");
    div.className = "card" + (openCards.has(d.id) ? " open" : "");
    const bClass = badgeMap[d.badge] || "badge-syn";
    const bLabel = badgeLabel[d.badge] || "";

    // コンテンツ本体
    let bodyHTML = "";
    if (d.items && d.items.length) {
      bodyHTML += `<div class="item-list">${d.items.map(i => `<span class="item" title="クリックでコピー">${escHtml(i)}</span>`).join("")}</div>`;
    }
    if (d.extra) {
      d.extra.forEach(e => {
        bodyHTML += `<div class="sub-label">${escHtml(e.label)}</div><div class="item-list">${e.items.map(i => `<span class="item" title="クリックでコピー">${escHtml(i)}</span>`).join("")}</div>`;
      });
    }
    if (d.note) {
      bodyHTML += `<div class="note">${escHtml(d.note)}</div>`;
    }

    const chevronSVG = `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>`;

    // 編集・削除ボタン（常に表示、削除はユーザー追加のみ）
    const editBtn = `<button class="card-action-btn edit" title="編集" data-id="${d.id}" onclick="openEditModal(this.dataset.id, event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`;
    const deleteBtn = userAddedIds.has(d.id)
      ? `<button class="card-action-btn delete" title="削除" data-id="${d.id}" onclick="deleteItem(this.dataset.id, event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>`
      : '';

    div.innerHTML = `
      <div class="card-header">
        <span class="card-num">${d.id}</span>
        <span class="card-title">${escHtml(d.title)}<span class="badge ${bClass}">${bLabel}</span></span>
        <div class="card-actions">${editBtn}${deleteBtn}</div>
        ${chevronSVG}
      </div>
      <div class="card-body">${bodyHTML}</div>`;

    // カードの開閉（ボタンクリック時は伝播させない）
    div.addEventListener("click", (e) => {
      if (e.target.closest('.card-action-btn')) return;
      if (e.target.closest('.item')) return;
      if (openCards.has(d.id)) openCards.delete(d.id);
      else openCards.add(d.id);
      div.classList.toggle("open");
      div.querySelector(".card-body").style.display = openCards.has(d.id) ? "block" : "none";
    });

    // itemクリックでコピー
    div.querySelectorAll && setTimeout(() => {
      div.querySelectorAll('.item').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          copyText(el.textContent, el);
        });
      });
    }, 0);

    if (openCards.has(d.id)) {
      div.querySelector(".card-body").style.display = "block";
    }
    container.appendChild(div);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function deleteItem(id, e) {
  e.stopPropagation();
  const numId = isNaN(id) ? id : Number(id);
  if (!confirm('この項目を削除しますか？')) return;
  const idx = data.findIndex(d => d.id == numId);
  if (idx !== -1) {
    data.splice(idx, 1);
    userAddedIds.delete(numId);
    render();
  }
}

function renderFilters() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = "";
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "chip" + (activeCat === c ? " active" : "");
    btn.textContent = c;
    btn.addEventListener("click", () => { activeCat = c; renderFilters(); render(); });
    bar.appendChild(btn);
  });
}

renderFilters();
render();

/* ───── 追加モーダル ───── */
let currentInputType = 'items';

function openModal() {
  currentInputType = 'items';
  document.getElementById('typeItems').classList.add('active');
  document.getElementById('typeNote').classList.remove('active');
  document.getElementById('sectionItems').style.display = '';
  document.getElementById('sectionNote').style.display = 'none';
  document.getElementById('newTitle').value = '';
  document.getElementById('newNote').value = '';
  document.getElementById('errorMsg').style.display = 'none';
  // アイテム行をリセット（3行初期表示）
  const rows = document.getElementById('itemsRows');
  rows.innerHTML = '';
  for (let i = 0; i < 3; i++) addItemRow();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchType(type) {
  currentInputType = type;
  document.getElementById('typeItems').classList.toggle('active', type === 'items');
  document.getElementById('typeNote').classList.toggle('active', type === 'note');
  document.getElementById('sectionItems').style.display = type === 'items' ? '' : 'none';
  document.getElementById('sectionNote').style.display = type === 'note' ? '' : 'none';
}

function addItemRow(value = '') {
  const rows = document.getElementById('itemsRows');
  const row = document.createElement('div');
  row.className = 'item-row';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = '例: be grateful to';
  inp.value = value;
  const btn = document.createElement('button');
  btn.className = 'btn-remove-item';
  btn.title = '削除';
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  btn.addEventListener('click', () => {
    if (rows.children.length > 1) rows.removeChild(row);
  });
  row.appendChild(inp);
  row.appendChild(btn);
  rows.appendChild(row);
  inp.focus();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function saveItem() {
  document.getElementById('errorMsg').style.display = 'none';

  const cat   = document.getElementById('newCat').value;
  const title = document.getElementById('newTitle').value.trim();
  const badge = document.getElementById('newBadge').value;

  if (!title) { showError('タイトルを入力してください。'); return; }

  // 新IDを生成（既存の最大数値IDより大きい番号）
  const numIds = data.map(d => typeof d.id === 'number' ? d.id : 0);
  const newId  = Math.max(...numIds) + 1;

  const entry = { id: newId, cat, title, badge };

  if (currentInputType === 'items') {
    const inputs = document.querySelectorAll('#itemsRows .item-row input');
    const items  = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
    if (!items.length) { showError('表現を1つ以上入力してください。'); return; }
    entry.items = items;
  } else {
    const note = document.getElementById('newNote').value.trim();
    if (!note) { showError('ノートの内容を入力してください。'); return; }
    entry.note = note;
  }

  data.push(entry);
  userAddedIds.add(newId);
  // 追加したカテゴリに切り替えて表示
  activeCat = cat;
  renderFilters();
  render();
  // 追加したカードまでスクロール
  setTimeout(() => {
    const allCards = document.querySelectorAll('#cards .card');
    if (allCards.length) allCards[allCards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
  closeModal();
}

/* ───── 編集モーダル ───── */
let editingId = null;
let currentEditInputType = 'items';

function openEditModal(rawId, e) {
  e.stopPropagation();
  const id = isNaN(rawId) ? rawId : Number(rawId);
  const d = data.find(x => x.id == id);
  if (!d) return;
  editingId = id;

  document.getElementById('editCat').value = d.cat;
  document.getElementById('editTitle').value = d.title;
  document.getElementById('editBadge').value = d.badge;
  document.getElementById('editErrorMsg').style.display = 'none';

  const hasNote = !!d.note;
  currentEditInputType = hasNote ? 'note' : 'items';
  document.getElementById('editTypeItems').classList.toggle('active', !hasNote);
  document.getElementById('editTypeNote').classList.toggle('active', hasNote);
  document.getElementById('editSectionItems').style.display = hasNote ? 'none' : '';
  document.getElementById('editSectionNote').style.display = hasNote ? '' : 'none';

  // items行を設定
  const rows = document.getElementById('editItemsRows');
  rows.innerHTML = '';
  const allItems = [...(d.items || []), ...((d.extra || []).flatMap(e => e.items))];
  if (allItems.length) {
    allItems.forEach(v => addEditItemRow(v));
  } else {
    addEditItemRow();
  }

  document.getElementById('editNote').value = d.note || '';
  document.getElementById('editModalOverlay').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModalOverlay').classList.remove('open');
  editingId = null;
}

function handleEditOverlayClick(e) {
  if (e.target === document.getElementById('editModalOverlay')) closeEditModal();
}

function switchEditType(type) {
  currentEditInputType = type;
  document.getElementById('editTypeItems').classList.toggle('active', type === 'items');
  document.getElementById('editTypeNote').classList.toggle('active', type === 'note');
  document.getElementById('editSectionItems').style.display = type === 'items' ? '' : 'none';
  document.getElementById('editSectionNote').style.display = type === 'note' ? '' : 'none';
}

function addEditItemRow(value = '') {
  const rows = document.getElementById('editItemsRows');
  const row = document.createElement('div');
  row.className = 'item-row';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = '例: be grateful to';
  inp.value = value;
  const btn = document.createElement('button');
  btn.className = 'btn-remove-item';
  btn.title = '削除';
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  btn.addEventListener('click', () => {
    if (rows.children.length > 1) rows.removeChild(row);
  });
  row.appendChild(inp);
  row.appendChild(btn);
  rows.appendChild(row);
}

function saveEditItem() {
  document.getElementById('editErrorMsg').style.display = 'none';
  const cat   = document.getElementById('editCat').value;
  const title = document.getElementById('editTitle').value.trim();
  const badge = document.getElementById('editBadge').value;
  if (!title) {
    const el = document.getElementById('editErrorMsg');
    el.textContent = 'タイトルを入力してください。';
    el.style.display = 'block';
    return;
  }
  const idx = data.findIndex(d => d.id == editingId);
  if (idx === -1) return;

  const entry = { id: editingId, cat, title, badge };
  if (currentEditInputType === 'items') {
    const inputs = document.querySelectorAll('#editItemsRows .item-row input');
    const items  = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
    if (!items.length) {
      const el = document.getElementById('editErrorMsg');
      el.textContent = '表現を1つ以上入力してください。';
      el.style.display = 'block';
      return;
    }
    entry.items = items;
  } else {
    const note = document.getElementById('editNote').value.trim();
    if (!note) {
      const el = document.getElementById('editErrorMsg');
      el.textContent = 'ノートの内容を入力してください。';
      el.style.display = 'block';
      return;
    }
    entry.note = note;
  }

  data[idx] = entry;
  openCards.add(editingId); // 編集後は開いた状態で表示
  render();
  closeEditModal();
  showToast('保存しました');
}
</script>
